---
name: "Build Anchorlight Postiz Image"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.dev \
            -t ghcr.io/anchorlight-consulting/postiz-app:latest \
            --build-arg NEXT_PUBLIC_VERSION=anchorlight \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --push \
            .
